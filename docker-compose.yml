services:

  postgres:
    image: postgres:16-alpine
    container_name: medisalud-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-medisalud}
      POSTGRES_USER: ${DB_USERNAME:-medisalud}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medisalud}
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-medisalud} -d ${DB_NAME:-medisalud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medisalud-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medisalud-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-medisalud}
      DB_USERNAME: ${DB_USERNAME:-medisalud}
      DB_PASSWORD: ${DB_PASSWORD:-medisalud}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - medisalud-net

volumes:
  postgres_data:

networks:
  medisalud-net:
    driver: bridge
