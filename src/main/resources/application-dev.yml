spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medisalud}
    username: ${DB_USERNAME:medisalud}
    password: ${DB_PASSWORD:medisalud}
    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.camel.medisalud: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
